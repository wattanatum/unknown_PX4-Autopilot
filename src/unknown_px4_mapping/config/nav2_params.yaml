bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000

    default_nav_to_pose_bt_xml: /home/ghosts/unknown_px4_ws/src/unknown_px4_mapping/behavior_trees/px4_nav_to_pose_slow_replan.xml

    navigators: ["navigate_to_pose", "navigate_through_poses"]

    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"

    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"


controller_server:
  ros__parameters:
    use_sim_time: true

    controller_frequency: 10.0

    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001

    failure_tolerance: 1.0

    progress_checker_plugin: progress_checker
    current_progress_checker: progress_checker

    goal_checker_plugins: ["general_goal_checker"]
    current_goal_checker: general_goal_checker

    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.02
      movement_time_allowance: 120.0

    general_goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      stateful: true
      xy_goal_tolerance: 0.45
      yaw_goal_tolerance: 1.57

    FollowPath:
      plugin: dwb_core::DWBLocalPlanner
      debug_trajectory_details: false

      # Do not force forward.
      # Drone may stop, turn, then move.
      min_vel_x: 0.00
      max_vel_x: 0.20
      min_vel_y: 0.0
      max_vel_y: 0.0

      max_vel_theta: 0.25

      min_speed_xy: 0.00
      max_speed_xy: 0.20
      min_speed_theta: 0.0

      acc_lim_x: 0.14
      acc_lim_y: 0.0
      acc_lim_theta: 0.30

      decel_lim_x: -0.14
      decel_lim_y: 0.0
      decel_lim_theta: -0.30

      vx_samples: 14
      vy_samples: 1
      vtheta_samples: 24

      sim_time: 1.0
      linear_granularity: 0.05
      angular_granularity: 0.025

      transform_tolerance: 1.0

      xy_goal_tolerance: 0.45
      trans_stopped_velocity: 0.03

      short_circuit_trajectory_evaluation: false
      stateful: true

      # No PreferForward.
      # No RotateToGoal.
      critics:
        - Oscillation
        - BaseObstacle
        - PathAlign
        - PathDist
        - GoalDist

      BaseObstacle.scale: 0.08

      # Follow path, but do not over-force forward motion.
      PathAlign.scale: 20.0
      PathAlign.forward_point_distance: 0.25

      PathDist.scale: 24.0

      # Lower goal pressure prevents cutting path corners.
      GoalDist.scale: 3.0


local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true

      update_frequency: 8.0
      publish_frequency: 4.0

      global_frame: odom
      robot_base_frame: base_link

      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05

      robot_radius: 0.35

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true

        observation_sources: scan

        scan:
          topic: /world/outdoor_slam_test/model/x500_lidar_2d_0/link/link/sensor/lidar_2d_v2/scan
          data_type: LaserScan

          max_obstacle_height: 4.0
          min_obstacle_height: 0.0

          clearing: true
          marking: true

          obstacle_max_range: 6.0
          obstacle_min_range: 0.1

          raytrace_max_range: 8.0
          raytrace_min_range: 0.1

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        enabled: true
        cost_scaling_factor: 2.0
        inflation_radius: 0.8

      always_send_full_costmap: true
      transform_tolerance: 1.0


global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true

      update_frequency: 2.0
      publish_frequency: 1.0

      global_frame: map
      robot_base_frame: base_link

      robot_radius: 0.35
      resolution: 0.10

      # IMPORTANT for mapping mode:
      # false allows planning through unknown/unexplored area.
      track_unknown_space: false

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        enabled: true
        map_subscribe_transient_local: true
        subscribe_to_updates: true

      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true

        observation_sources: scan

        scan:
          topic: /world/outdoor_slam_test/model/x500_lidar_2d_0/link/link/sensor/lidar_2d_v2/scan
          data_type: LaserScan

          max_obstacle_height: 4.0
          min_obstacle_height: 0.0

          clearing: true
          marking: true

          obstacle_max_range: 8.0
          obstacle_min_range: 0.1

          raytrace_max_range: 10.0
          raytrace_min_range: 0.1

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        enabled: true
        cost_scaling_factor: 2.0
        inflation_radius: 1.0

      always_send_full_costmap: true
      transform_tolerance: 1.0


planner_server:
  ros__parameters:
    use_sim_time: true

    expected_planner_frequency: 2.0

    planner_plugins: ["GridBased"]

    GridBased:
      plugin: nav2_navfn_planner::NavfnPlanner
      tolerance: 1.0
      use_astar: true

      # IMPORTANT for mapping mode:
      # allow path through unknown map cells.
      allow_unknown: true


smoother_server:
  ros__parameters:
    use_sim_time: true

    smoother_plugins: ["simple_smoother"]

    simple_smoother:
      plugin: nav2_smoother::SimpleSmoother
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true


behavior_server:
  ros__parameters:
    use_sim_time: true

    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint

    cycle_frequency: 10.0

    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]

    spin:
      plugin: nav2_behaviors::Spin

    backup:
      plugin: nav2_behaviors::BackUp

    drive_on_heading:
      plugin: nav2_behaviors::DriveOnHeading

    wait:
      plugin: nav2_behaviors::Wait

    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 1.0

    simulate_ahead_time: 1.5
    max_rotational_vel: 0.2
    min_rotational_vel: 0.05
    rotational_acc_lim: 0.2


waypoint_follower:
  ros__parameters:
    use_sim_time: true

    loop_rate: 20
    stop_on_failure: false

    waypoint_task_executor_plugin: wait_at_waypoint

    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: true
      waypoint_pause_duration: 200


map_saver:
  ros__parameters:
    use_sim_time: true

    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true
