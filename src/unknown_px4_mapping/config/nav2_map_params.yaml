amcl:
  ros__parameters:
    use_sim_time: true

    # Frames
    global_frame_id: "map"
    odom_frame_id: "odom"
    base_frame_id: "base_link"

    # PX4 lidar scan topic
    scan_topic: "/world/outdoor_slam_test/model/x500_lidar_2d_0/link/link/sensor/lidar_2d_v2/scan"

    # AMCL must publish map -> odom
    tf_broadcast: true
    transform_tolerance: 2.0

    # Important: create initial map -> odom transform automatically
    set_initial_pose: true
    always_reset_initial_pose: true

    # Start pose on your saved map.
    # If robot appears wrong in RViz, use 2D Pose Estimate later.
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

    # Particle filter
    min_particles: 500
    max_particles: 2000
    kld_err: 0.05
    kld_z: 0.99
    update_min_d: 0.05
    update_min_a: 0.05
    resample_interval: 1
    recovery_alpha_slow: 0.0
    recovery_alpha_fast: 0.0
    save_pose_rate: 0.5

    # Laser model
    laser_model_type: "likelihood_field"
    laser_likelihood_max_dist: 2.0
    max_beams: 60
    z_hit: 0.5
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.5
    sigma_hit: 0.2
    lambda_short: 0.1

    # Motion model
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2

map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: true
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0

    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001

    failure_tolerance: 0.5
    odom_topic: "/odom"

    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05
      movement_time_allowance: 15.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.30
      yaw_goal_tolerance: 0.35

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false

      # PX4 drone controlled like forward + yaw robot
      min_vel_x: 0.00
      max_vel_x: 0.22
      min_vel_y: 0.00
      max_vel_y: 0.00
      max_vel_theta: 0.35

      min_speed_xy: 0.00
      max_speed_xy: 0.22
      min_speed_theta: 0.00

      acc_lim_x: 0.25
      acc_lim_y: 0.00
      acc_lim_theta: 0.5

      decel_lim_x: -0.25
      decel_lim_y: 0.00
      decel_lim_theta: -0.5

      vx_samples: 12
      vy_samples: 1
      vtheta_samples: 20

      sim_time: 1.5
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 2.0

      xy_goal_tolerance: 0.30
      trans_stopped_velocity: 0.03
      short_circuit_trajectory_evaluation: true
      stateful: true

      critics:
        [
          "RotateToGoal",
          "Oscillation",
          "BaseObstacle",
          "GoalAlign",
          "PathAlign",
          "PathDist",
          "GoalDist"
        ]

      BaseObstacle.scale: 0.02
      PathAlign.scale: 16.0
      PathAlign.forward_point_distance: 0.3
      GoalAlign.scale: 12.0
      GoalAlign.forward_point_distance: 0.3
      PathDist.scale: 24.0
      GoalDist.scale: 18.0
      RotateToGoal.scale: 20.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0
      Oscillation.scale: 0.05

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 2.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: true
      allow_unknown: false

smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["simple_smoother"]

    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: true

    local_costmap_topic: "local_costmap/costmap_raw"
    global_costmap_topic: "global_costmap/costmap_raw"
    local_footprint_topic: "local_costmap/published_footprint"
    global_footprint_topic: "global_costmap/published_footprint"

    cycle_frequency: 10.0

    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]

    spin:
      plugin: "nav2_behaviors::Spin"

    backup:
      plugin: "nav2_behaviors::BackUp"

    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"

    wait:
      plugin: "nav2_behaviors::Wait"

    global_frame: "odom"
    robot_base_frame: "base_link"
    transform_tolerance: 2.0

    simulate_ahead_time: 2.0
    max_rotational_vel: 0.35
    min_rotational_vel: 0.05
    rotational_acc_lim: 0.5

bt_navigator:
  ros__parameters:
    use_sim_time: true

    global_frame: "map"
    robot_base_frame: "base_link"
    odom_topic: "/odom"

    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000

    navigators: ["navigate_to_pose", "navigate_through_poses"]

    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"

    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false

    waypoint_task_executor_plugin: "wait_at_waypoint"

    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"

    max_velocity: [0.22, 0.0, 0.35]
    min_velocity: [0.0, 0.0, -0.35]

    max_accel: [0.25, 0.0, 0.5]
    max_decel: [-0.25, 0.0, -0.5]

    odom_topic: "/odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true

      global_frame: "odom"
      robot_base_frame: "base_link"
      transform_tolerance: 2.0

      update_frequency: 5.0
      publish_frequency: 2.0

      rolling_window: true
      width: 6
      height: 6
      resolution: 0.1

      # Drone safety size
      robot_radius: 0.35

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: "scan"

        scan:
          topic: "/world/outdoor_slam_test/model/x500_lidar_2d_0/link/link/sensor/lidar_2d_v2/scan"
          max_obstacle_height: 3.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 8.0
          raytrace_min_range: 0.0
          obstacle_max_range: 6.0
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.45
        cost_scaling_factor: 3.0

      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true

      global_frame: "map"
      robot_base_frame: "base_link"
      transform_tolerance: 2.0

      update_frequency: 1.0
      publish_frequency: 1.0

      resolution: 0.1
      track_unknown_space: true

      # Drone safety size.
      # Increase to block narrow path.
      robot_radius: 0.35

      # For saved-map navigation, keep global costmap simple.
      # Static map + inflation only.
      plugins: ["static_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_subscribe_transient_local: true
        subscribe_to_updates: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.45
        cost_scaling_factor: 3.0

      always_send_full_costmap: true
